name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on: [push]

jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."

      - name: Check out repository code
        uses: actions/checkout@v4

      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."

      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}                              

      - name: Build Docker image
        run: |
          docker build -t suposce/supos-ce-mcpclient:latest .                      

      - name: Log in to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin                              

      - name: Tag and push Docker image
        run: |
          TIMESTAMP=$(date +'%Y%m%d%H%M%S')
          
          docker tag suposce/supos-ce-mcpclient:latest suposce/supos-ce-mcpclient:${TIMESTAMP}
          docker push suposce/supos-ce-mcpclient:${TIMESTAMP}      

          docker tag suposce/supos-ce-mcpclient:latest suposce/supos-ce-mcpclient:latest
          docker push suposce/supos-ce-mcpclient:latest 

          docker rmi suposce/supos-ce-mcpclient:${TIMESTAMP}
          docker rmi suposce/supos-ce-mcpclient:latest                    

      - name: Clean up
        run: |
          docker builder prune --all --force
          docker volume prune -f
          docker network prune -f
          docker system df
          docker rmi $(docker images --filter "dangling=true" -q) || true                    

      - run: echo "🍏 This job's status is ${{ job.status }}."
